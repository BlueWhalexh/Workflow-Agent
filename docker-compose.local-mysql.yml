name: my-workflow-agent-local

services:
  mysql:
    image: mysql:8.4.0
    ports:
      - "${MY_WORKFLOW_MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${MY_WORKFLOW_MYSQL_DATABASE:-my_workflow_agent}
      MYSQL_USER: ${MY_WORKFLOW_MYSQL_USER:-my_workflow_agent}
      MYSQL_PASSWORD: ${MY_WORKFLOW_MYSQL_PASSWORD:-my_workflow_agent_dev}
      MYSQL_ROOT_PASSWORD: ${MY_WORKFLOW_MYSQL_ROOT_PASSWORD:-my_workflow_agent_root_dev}
    command:
      - "mysqld"
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
